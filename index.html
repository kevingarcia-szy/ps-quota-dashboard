<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Live Quota Needs</title>
<style>
  /* ----------------------------------------------------------------
     PS QUOTA DASHBOARD
     Reads from quota_data.json (written by the Python tracker).
     Zero API keys, zero credentials — just static data.
  ---------------------------------------------------------------- */
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --text-secondary: #5f6672;
    --text-muted: #9ca0a9;
    --accent: #4a6cf7;
    --red: #dc3545;
    --red-bg: #fce8e6;
    --red-fill: #e57373;
    --yellow: #e6a817;
    --yellow-bg: #fef7e0;
    --yellow-fill: #ffd54f;
    --green: #2e7d32;
    --green-bg: #e6f4ea;
    --green-fill: #66bb6a;
    --header-bg: #2c3e50;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* --- HEADER --- */
  .header {
    background: var(--header-bg);
    color: white;
    padding: 20px 24px 16px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
  }
  .header .updated {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
  }

  /* --- SUMMARY STATS --- */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    padding: 16px 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 24px; font-weight: 600; margin-top: 2px; }
  .stat-val.red { color: var(--red); }
  .stat-val.green { color: var(--green); }
  .stat-val.yellow { color: var(--yellow); }

  /* --- SEARCH --- */
  .search-bar {
    padding: 0 24px 12px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: var(--surface);
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-muted); }

  /* --- MISSION CARDS --- */
  .missions { padding: 0 24px 24px; }

  .mission-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .mission-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .mission-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    user-select: none;
  }
  .mission-header:hover { background: #f9fafb; }

  /* expand/collapse arrow */
  .arrow {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    transition: transform 0.2s;
    color: var(--text-muted);
  }
  .mission-card.open .arrow { transform: rotate(90deg); }

  .mission-info { flex: 1; min-width: 0; }
  .mission-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mission-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .mission-meta span { white-space: nowrap; }

  /* progress bar on the mission header */
  .progress-wrap {
    width: 120px;
    flex-shrink: 0;
    text-align: right;
  }
  .progress-text {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .progress-bar {
    height: 6px;
    background: #eee;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

  /* status badge */
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.behind { background: var(--red-bg); color: var(--red); }
  .badge.watch { background: var(--yellow-bg); color: var(--yellow); }
  .badge.on_track { background: var(--green-bg); color: var(--green); }

  /* --- QUOTA DETAIL (collapsible) --- */
  .quota-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0 18px 14px;
  }
  .mission-card.open .quota-detail { display: block; }

  .quota-group-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    padding: 12px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }

  .quota-row {
    display: grid;
    grid-template-columns: 1fr 65px 65px 65px 90px;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
    align-items: center;
    border-bottom: 1px solid #f2f3f5;
  }
  .quota-row:last-child { border-bottom: none; }
  .quota-row .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .quota-row .paused { color: var(--text-muted); font-style: italic; }
  .quota-row .num { text-align: right; font-variant-numeric: tabular-nums; }
  .quota-row .needed { font-weight: 600; }
  .quota-row .needed.red { color: var(--red); }
  .quota-row .needed.yellow { color: var(--yellow); }
  .quota-row .needed.green { color: var(--green); }

  .mini-bar {
    width: 100%;
    height: 4px;
    background: #eee;
    border-radius: 2px;
    overflow: hidden;
  }
  .mini-fill { height: 100%; border-radius: 2px; }
  .fill-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fill-pct { font-size: 11px; color: var(--text-secondary); min-width: 36px; text-align: right; }

  /* --- EMPTY STATE --- */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
    font-size: 15px;
  }

  /* --- LOADING --- */
  .loading {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 600px) {
    .header { padding: 16px; }
    .stats { padding: 12px 16px; grid-template-columns: repeat(2, 1fr); }
    .search-bar { padding: 0 16px 12px; }
    .missions { padding: 0 16px 16px; }
    .mission-header { padding: 12px; gap: 10px; flex-wrap: wrap; }
    .progress-wrap { width: 100%; text-align: left; }
    .mission-meta { gap: 8px; }
    .quota-row { grid-template-columns: 1fr 50px 50px 50px 70px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>PS Live Quota Needs</h1>
  <div class="subtitle">Classic / Legacy (MIS-) missions only &mdash; auto-refreshes every 15 min</div>
  <div class="updated" id="lastUpdated">Loading...</div>
</div>

<div class="stats" id="statsRow">
  <div class="stat-card"><div class="stat-label">Live missions</div><div class="stat-val" id="statTotal">—</div></div>
  <div class="stat-card"><div class="stat-label">Behind</div><div class="stat-val red" id="statBehind">—</div></div>
  <div class="stat-card"><div class="stat-label">Watch</div><div class="stat-val yellow" id="statWatch">—</div></div>
  <div class="stat-card"><div class="stat-label">On track</div><div class="stat-val green" id="statOnTrack">—</div></div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search by project name, quota label, etc.">
</div>

<div class="missions" id="missionsList">
  <div class="loading">Loading quota data...</div>
</div>

<script>
  // ----------------------------------------------------------------
  // DASHBOARD LOGIC
  // Reads quota_data.json (same folder). No API keys, no auth.
  // ----------------------------------------------------------------

  let allMissions = [];

  // fetch the JSON data written by the Python tracker
  async function loadData() {
    try {
      // add a cache-buster so browsers don't serve stale data
      const resp = await fetch('quota_data.json?t=' + Date.now());
      if (!resp.ok) throw new Error('Could not load quota_data.json');
      const data = await resp.json();

      allMissions = data.missions || [];

      // update the timestamp
      const updated = data.last_updated || '';
      document.getElementById('lastUpdated').textContent = updated
        ? 'Last updated: ' + formatTimestamp(updated) + ' ET'
        : '';

      // update summary stats
      document.getElementById('statTotal').textContent = allMissions.length;
      document.getElementById('statBehind').textContent = allMissions.filter(m => m.status === 'behind').length;
      document.getElementById('statWatch').textContent = allMissions.filter(m => m.status === 'watch').length;
      document.getElementById('statOnTrack').textContent = allMissions.filter(m => m.status === 'on_track').length;

      renderMissions(allMissions);
    } catch (e) {
      document.getElementById('missionsList').innerHTML =
        '<div class="empty-state">Could not load quota data.<br>Make sure quota_data.json is in the same folder.</div>';
      console.error(e);
    }
  }

  // format ISO timestamp to readable string
  function formatTimestamp(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US') + ' ' +
             d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    } catch { return iso; }
  }

  // get color class based on fill percentage
  function colorClass(pct) {
    if (pct >= 80) return 'green';
    if (pct >= 50) return 'yellow';
    return 'red';
  }

  // get fill bar color
  function barColor(pct) {
    if (pct >= 80) return 'var(--green-fill)';
    if (pct >= 50) return 'var(--yellow-fill)';
    return 'var(--red-fill)';
  }

  // render the mission cards
  function renderMissions(missions) {
    const container = document.getElementById('missionsList');

    if (!missions.length) {
      container.innerHTML = '<div class="empty-state">No live MIS- missions at this time.</div>';
      return;
    }

    // sort: behind first, then watch, then on track
    const order = { behind: 0, watch: 1, on_track: 2 };
    missions.sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

    container.innerHTML = missions.map((m, idx) => {
      // build the quota detail HTML
      let quotaHTML = '';
      if (m.quotas && m.quotas.length > 0) {
        for (const group of m.quotas) {
          quotaHTML += '<div class="quota-group-label">' + escapeHTML(group.group) + '</div>';
          for (const cell of group.cells) {
            const pct = cell.fill_pct || 0;
            const clr = colorClass(pct);
            const pausedClass = cell.is_paused ? ' paused' : '';
            const pausedTag = cell.is_paused ? ' <span style="color:var(--text-muted);font-size:10px;">(PAUSED)</span>' : '';
            quotaHTML += `
              <div class="quota-row">
                <div class="label${pausedClass}">${escapeHTML(cell.label)}${pausedTag}</div>
                <div class="num">${cell.target}</div>
                <div class="num">${cell.filled}</div>
                <div class="num needed ${cell.needed > 0 ? clr : ''}">${cell.needed > 0 ? cell.needed : '—'}</div>
                <div class="fill-wrap">
                  <div class="mini-bar"><div class="mini-fill" style="width:${Math.min(pct, 100)}%;background:${barColor(pct)}"></div></div>
                  <div class="fill-pct">${pct}%</div>
                </div>
              </div>`;
          }
        }
      } else {
        quotaHTML = '<div style="padding:12px 0;color:var(--text-muted);font-size:13px;">No quotas configured</div>';
      }

      // column headers for the quota detail (target / filled / needed / fill %)
      const colHeaders = `
        <div class="quota-row" style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);padding-bottom:4px;">
          <div>Cell</div>
          <div class="num">Target</div>
          <div class="num">Filled</div>
          <div class="num">Needed</div>
          <div style="text-align:right;">Progress</div>
        </div>`;

      return `
        <div class="mission-card" data-idx="${idx}" data-search="${escapeHTML(m.ref_name + ' ' + JSON.stringify(m.quotas)).toLowerCase()}">
          <div class="mission-header" onclick="toggleCard(this)">
            <svg class="arrow" viewBox="0 0 20 20" fill="currentColor"><path d="M7.3 4.3a1 1 0 011.4 0l5 5a1 1 0 010 1.4l-5 5a1 1 0 01-1.4-1.4L11.6 10 7.3 5.7a1 1 0 010-1.4z"/></svg>
            <div class="mission-info">
              <div class="mission-name">${escapeHTML(m.ref_name)}</div>
              <div class="mission-meta">
                <span>IR: ${m.ir || '—'}%</span>
                <span>LOI: ${m.loi || '—'}m</span>
                <span>Launch: ${m.launch_date || '—'}</span>
                <span>OOF: ${m.oof || '—'}</span>
              </div>
            </div>
            <div class="progress-wrap">
              <div class="progress-text" style="color:${barColor(m.fill_pct)}">${m.filled} / ${m.target} (${m.fill_pct}%)</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(m.fill_pct, 100)}%;background:${barColor(m.fill_pct)}"></div></div>
            </div>
            <div class="badge ${m.status}">${m.status === 'on_track' ? 'On track' : m.status === 'watch' ? 'Watch' : 'Behind'}</div>
          </div>
          <div class="quota-detail">${colHeaders}${quotaHTML}</div>
        </div>`;
    }).join('');
  }

  // toggle card expand/collapse
  function toggleCard(header) {
    header.closest('.mission-card').classList.toggle('open');
  }

  // search filter
  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    const cards = document.querySelectorAll('.mission-card');
    cards.forEach(card => {
      const searchText = card.getAttribute('data-search') || '';
      card.style.display = (!q || searchText.includes(q)) ? '' : 'none';
    });
  });

  // escape HTML to prevent XSS from data
  function escapeHTML(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // load on page open
  loadData();
</script>
</body>
</html>
